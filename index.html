<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>АгроАдмин</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Telegram Theme Variables with Fallbacks */
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #0f172a);
            --tg-hint: var(--tg-theme-hint-color, #64748b);
            --tg-link: var(--tg-theme-link-color, #3b82f6);
            --tg-button: var(--tg-theme-button-color, #3b82f6);
            --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
            --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #f8fafc);
            
            /* Design System */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Status Colors */
            --status-new: #3b82f6;
            --status-processing: #f59e0b;
            --status-assembling: #8b5cf6;
            --status-shipped: #06b6d4;
            --status-delivered: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--tg-secondary-bg);
            color: var(--tg-text);
            line-height: 1.5;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* --- Auth Screen --- */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: var(--tg-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 24px;
            text-align: center;
        }
        .auth-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #ef4444, #f97316);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 24px;
            color: white;
        }

        /* --- Header & Stats --- */
        .app-header {
            background: var(--tg-bg);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .header-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.025em;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 16px 20px;
        }
        .stat-card {
            background: var(--tg-bg);
            padding: 16px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.03);
        }
        .stat-label {
            font-size: 13px;
            color: var(--tg-hint);
            font-weight: 500;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        /* --- Segmented Control (Tabs) --- */
        .tabs-container {
            padding: 0 20px 16px;
            background: var(--tg-bg);
        }
        .segmented-control {
            display: flex;
            background: var(--tg-secondary-bg);
            padding: 4px;
            border-radius: var(--radius-md);
            position: relative;
        }
        .tab-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            background: transparent;
            color: var(--tg-hint);
            font-size: 14px;
            font-weight: 600;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            z-index: 2;
        }
        .tab-btn.active {
            color: var(--tg-text);
            background: var(--tg-bg);
            box-shadow: var(--shadow-sm);
        }

        /* --- Content Views --- */
        .view {
            display: none;
            padding: 0 20px 100px;
            animation: fadeIn 0.3s ease;
        }
        .view.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Cards & Lists --- */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .item-card {
            background: var(--tg-bg);
            border-radius: var(--radius-md);
            padding: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: var(--transition);
        }
        .item-card:active {
            transform: scale(0.98);
        }
        .item-icon {
            width: 48px;
            height: 48px;
            background: var(--tg-secondary-bg);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
        }
        .item-info {
            flex: 1;
            min-width: 0;
        }
        .item-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-subtitle {
            font-size: 13px;
            color: var(--tg-hint);
        }
        .item-actions {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: none;
            background: var(--tg-secondary-bg);
            color: var(--tg-hint);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }
        .icon-btn:hover { background: #e2e8f0; color: var(--tg-text); }
        .icon-btn.danger:hover { background: #fee2e2; color: #ef4444; }

        /* --- Order Specifics --- */
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .order-id {
            font-size: 13px;
            font-weight: 600;
            color: var(--tg-hint);
        }
        .status-badge {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }
        .status-new { background: #dbeafe; color: #1d4ed8; }
        .status-processing { background: #fef3c7; color: #b45309; }
        .status-assembling { background: #ede9fe; color: #6d28d9; }
        .status-shipped { background: #cffafe; color: #0e7490; }
        .status-delivered { background: #d1fae5; color: #047857; }

        .order-details {
            font-size: 14px;
            color: var(--tg-text);
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .status-select {
            width: 100%;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(0,0,0,0.1);
            background: var(--tg-secondary-bg);
            color: var(--tg-text);
            font-size: 14px;
            font-weight: 500;
            outline: none;
        }

        /* --- Floating Action Button --- */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--tg-button);
            color: var(--tg-button-text);
            border: none;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: var(--transition);
            z-index: 40;
        }
        .fab:active { transform: scale(0.9); }

        /* --- Modal / Sheet --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        .modal-sheet {
            background: var(--tg-bg);
            width: 100%;
            max-width: 600px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-overlay.active .modal-sheet {
            transform: translateY(0);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
        }
        .close-btn {
            background: var(--tg-secondary-bg);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--tg-hint);
        }

        /* --- Forms --- */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--tg-hint);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-input, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(0,0,0,0.1);
            background: var(--tg-secondary-bg);
            color: var(--tg-text);
            font-size: 15px;
            transition: var(--transition);
            outline: none;
        }
        .form-input:focus, .form-textarea:focus {
            border-color: var(--tg-button);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-sm);
            background: var(--tg-button);
            color: var(--tg-button-text);
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-primary:active { opacity: 0.9; transform: scale(0.98); }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-sm);
            background: var(--tg-secondary-bg);
            color: var(--tg-text);
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-top: 12px;
        }

        /* --- Empty State --- */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--tg-hint);
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Loader */
        .loader {
            position: fixed;
            inset: 0;
            background: var(--tg-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9998;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--tg-secondary-bg);
            border-top-color: var(--tg-button);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Экран авторизации -->
    <div id="auth-screen">
        <div class="auth-icon">🔒</div>
        <h2 style="margin-bottom: 8px; font-size: 20px;">Доступ ограничен</h2>
        <p style="color: var(--tg-hint); font-size: 15px;">У вас нет прав администратора для управления этим магазином.</p>
    </div>

    <!-- Лоадер -->
    <div id="loader" class="loader" style="display: none;">
        <div class="spinner"></div>
    </div>

    <!-- Основное приложение -->
    <div id="app-container" style="display: none;">
        <header class="app-header">
            <div class="header-title">АгроАдмин</div>
        </header>

        <!-- Статистика -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Заказов сегодня</div>
                <div class="stat-value" id="stat-orders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Выручка</div>
                <div class="stat-value" id="stat-revenue">0 ₽</div>
            </div>
        </div>

        <!-- Навигация -->
        <div class="tabs-container">
            <div class="segmented-control">
                <button class="tab-btn active" data-tab="products">📦 Товары</button>
                <button class="tab-btn" data-tab="coming">🌱 Скоро</button>
                <button class="tab-btn" data-tab="orders">📋 Заказы</button>
            </div>
        </div>

        <main>
            <!-- Товары -->
            <div id="view-products" class="view active">
                <div id="products-list" class="list-container"></div>
                <button class="fab" onclick="openModal('product')">+</button>
            </div>

            <!-- Скоро появится -->
            <div id="view-coming" class="view">
                <div id="coming-list" class="list-container"></div>
                <button class="fab" onclick="openModal('coming')">+</button>
            </div>

            <!-- Заказы -->
            <div id="view-orders" class="view">
                <div id="orders-list" class="list-container"></div>
            </div>
        </main>
    </div>

    <!-- Модальное окно: Товар -->
    <div id="modal-product" class="modal-overlay" onclick="if(event.target === this) closeModal('product')">
        <div class="modal-sheet">
            <div class="modal-header">
                <div class="modal-title" id="product-modal-title">Новый товар</div>
                <button class="close-btn" onclick="closeModal('product')">✕</button>
            </div>
            <form id="form-product" onsubmit="handleProductSubmit(event)">
                <input type="hidden" id="prod-id">
                <div class="form-group">
                    <label class="form-label">Название</label>
                    <input type="text" class="form-input" id="prod-name" required placeholder="Например: Яблоки Голден">
                </div>
                <div class="form-group">
                    <label class="form-label">Цена (₽)</label>
                    <input type="number" class="form-input" id="prod-price" required placeholder="150">
                </div>
                <div class="form-group">
                    <label class="form-label">Эмодзи или URL фото</label>
                    <input type="text" class="form-input" id="prod-image" placeholder="🍎 или https://...">
                </div>
                <div class="form-group">
                    <label class="form-label">Описание</label>
                    <textarea class="form-textarea" id="prod-desc" placeholder="Свежие, сладкие, с нашей фермы..."></textarea>
                </div>
                <button type="submit" class="btn-primary">Сохранить</button>
                <button type="button" class="btn-secondary" onclick="closeModal('product')">Отмена</button>
            </form>
        </div>
    </div>

    <!-- Модальное окно: Скоро появится -->
    <div id="modal-coming" class="modal-overlay" onclick="if(event.target === this) closeModal('coming')">
        <div class="modal-sheet">
            <div class="modal-header">
                <div class="modal-title">Добавить позицию</div>
                <button class="close-btn" onclick="closeModal('coming')">✕</button>
            </div>
            <form id="form-coming" onsubmit="handleComingSubmit(event)">
                <div class="form-group">
                    <label class="form-label">Название</label>
                    <input type="text" class="form-input" id="come-name" required placeholder="Например: Персики">
                </div>
                <div class="form-group">
                    <label class="form-label">Сезон / Примечание</label>
                    <input type="text" class="form-input" id="come-season" placeholder="Например: Июль 2024">
                </div>
                <button type="submit" class="btn-primary">Сохранить</button>
                <button type="button" class="btn-secondary" onclick="closeModal('coming')">Отмена</button>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // КОНФИГУРАЦИЯ И ИНИЦИАЛИЗАЦИЯ
        // ==========================================
        const tg = window.Telegram.WebApp;
        
        // ⚠️ ЗАМЕНИТЕ на реальный Telegram ID менеджера
        const ALLOWED_MANAGER_ID = 6380640298; 
        
        const API_BASE = 'https://anxietycoach.online/webhook'; // Замените на ваш URL

        let state = {
            products: [],
            coming: [],
            orders: []
        };

        // Инициализация
        function init() {
            tg.ready();
            tg.expand();
            
            const user = tg.initDataUnsafe?.user;
            if (!user || user.id !== ALLOWED_MANAGER_ID) {
                document.getElementById('auth-screen').style.display = 'flex';
                return;
            }
            
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            
            setupTabs();
            loadData();
        }

        // ==========================================
        // НАВИГАЦИЯ И UI
        // ==========================================
        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    haptic('light');
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                    document.getElementById(`view-${btn.dataset.tab}`).classList.add('active');
                });
            });
        }

        function haptic(type = 'light') {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(type);
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'flex' : 'none';
        }

        function openModal(type, data = null) {
            haptic('medium');
            const modal = document.getElementById(`modal-${type}`);
            modal.classList.add('active');
            
            if (type === 'product') {
                document.getElementById('product-modal-title').textContent = data ? 'Редактировать товар' : 'Новый товар';
                document.getElementById('prod-id').value = data ? data.id : '';
                document.getElementById('prod-name').value = data ? data.name : '';
                document.getElementById('prod-price').value = data ? data.price : '';
                document.getElementById('prod-image').value = data ? (data.image_url || '') : '';
                document.getElementById('prod-desc').value = data ? (data.description || '') : '';
            }
        }

        function closeModal(type) {
            haptic('light');
            document.getElementById(`modal-${type}`).classList.remove('active');
            if (type === 'product') document.getElementById('form-product').reset();
            if (type === 'coming') document.getElementById('form-coming').reset();
        }

        // ==========================================
        // API И ДАННЫЕ
        // ==========================================
        async function apiRequest(endpoint, method = 'GET', body = null) {
            const headers = {
                'Content-Type': 'application/json',
                'X-Telegram-Init-Data': tg.initData
            };
            const config = { method, headers };
            if (body) config.body = JSON.stringify(body);
            
            const res = await fetch(`${API_BASE}${endpoint}`, config);
            if (!res.ok) throw new Error('API Error');
            return res.json();
        }

        async function loadData() {
            showLoader(true);
            try {
                const [products, coming, orders] = await Promise.all([
                    apiRequest('/api/admin/products').catch(() => []),
                    apiRequest('/api/admin/coming-soon').catch(() => []),
                    apiRequest('/api/admin/orders').catch(() => [])
                ]);
                
                state.products = products;
                state.coming = coming;
                state.orders = orders;
                
                renderAll();
            } catch (e) {
                console.error(e);
                tg.showAlert('Ошибка загрузки данных');
            } finally {
                showLoader(false);
            }
        }

        // ==========================================
        // РЕНДЕРИНГ
        // ==========================================
        function renderAll() {
            renderStats();
            renderProducts();
            renderComing();
            renderOrders();
        }

        function renderStats() {
            const today = new Date().toDateString();
            const todayOrders = state.orders.filter(o => new Date(o.created_at).toDateString() === today);
            const revenue = todayOrders.reduce((sum, o) => sum + Number(o.total_amount), 0);
            
            document.getElementById('stat-orders').textContent = todayOrders.length;
            document.getElementById('stat-revenue').textContent = revenue.toLocaleString('ru-RU') + ' ₽';
        }

        function renderProducts() {
            const container = document.getElementById('products-list');
            if (state.products.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><p>Товаров пока нет</p></div>`;
                return;
            }
            
            container.innerHTML = state.products.map(p => {
                const isUrl = p.image_url && p.image_url.startsWith('http');
                const iconContent = isUrl ? '' : (p.image_url || '🌾');
                const bgStyle = isUrl ? `style="background-image: url('${p.image_url}')"` : '';
                
                return `
                <div class="item-card">
                    <div class="item-icon" ${bgStyle}>${iconContent}</div>
                    <div class="item-info">
                        <div class="item-title">${escapeHtml(p.name)}</div>
                        <div class="item-subtitle">${Number(p.price).toLocaleString('ru-RU')} ₽</div>
                    </div>
                    <div class="item-actions">
                        <button class="icon-btn" onclick='openModal("product", ${JSON.stringify(p).replace(/'/g, "&#39;")})'>✎</button>
                        <button class="icon-btn danger" onclick="deleteProduct('${p.id}')">🗑</button>
                    </div>
                </div>`;
            }).join('');
        }

        function renderComing() {
            const container = document.getElementById('coming-list');
            if (state.coming.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-icon">🌱</div><p>Список пуст</p></div>`;
                return;
            }
            
            container.innerHTML = state.coming.map(c => `
                <div class="item-card">
                    <div class="item-info">
                        <div class="item-title">${escapeHtml(c.name)}</div>
                        <div class="item-subtitle">${escapeHtml(c.season || 'Скоро')}</div>
                    </div>
                    <div class="item-actions">
                        <button class="icon-btn danger" onclick="deleteComing('${c.id}')">🗑</button>
                    </div>
                </div>
            `).join('');
        }

        function renderOrders() {
            const container = document.getElementById('orders-list');
            if (state.orders.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>Заказов пока нет</p></div>`;
                return;
            }
            
            const statusClasses = {
                'Новый': 'status-new',
                'В обработке': 'status-processing',
                'Собирается': 'status-assembling',
                'Отправлен': 'status-shipped',
                'Доставлен': 'status-delivered'
            };
            
            const statuses = ['Новый', 'В обработке', 'Собирается', 'Отправлен', 'Доставлен'];
            
            container.innerHTML = state.orders.map(o => {
                const date = new Date(o.created_at).toLocaleDateString('ru-RU', {day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit'});
                return `
                <div class="item-card" style="flex-direction: column; align-items: stretch;">
                    <div class="order-header">
                        <span class="order-id">#${o.id.slice(0, 8)} • ${date}</span>
                        <span class="status-badge ${statusClasses[o.status] || 'status-new'}">${o.status}</span>
                    </div>
                    <div class="order-details">
                        👤 ${escapeHtml(o.name)}<br>
                        📞 ${escapeHtml(o.phone)}<br>
                        📍 ${escapeHtml(o.address)}<br>
                        💰 <strong>${Number(o.total_amount).toLocaleString('ru-RU')} ₽</strong>
                    </div>
                    <select class="status-select" onchange="updateOrderStatus('${o.id}', this.value)">
                        ${statuses.map(s => `<option value="${s}" ${o.status === s ? 'selected' : ''}>${s}</option>`).join('')}
                    </select>
                </div>`;
            }).join('');
        }

        // ==========================================
        // ОБРАБОТЧИКИ ДЕЙСТВИЙ
        // ==========================================
        async function handleProductSubmit(e) {
            e.preventDefault();
            haptic('medium');
            
            const id = document.getElementById('prod-id').value;
            const payload = {
                name: document.getElementById('prod-name').value,
                price: document.getElementById('prod-price').value,
                image_url: document.getElementById('prod-image').value,
                description: document.getElementById('prod-desc').value
            };
            
            try {
                if (id) {
                    payload.id = id; await apiRequest('/api/admin/products/update', 'POST', payload);
                } else {
                    await apiRequest('/api/admin/products', 'POST', payload);
                }
                closeModal('product');
                await loadData();
                tg.showAlert('Товар сохранен');
            } catch (err) {
                tg.showAlert('Ошибка сохранения');
            }
        }

        async function deleteProduct(id) {
            if (!confirm('Удалить этот товар?')) return;
            try {
                await apiRequest('/api/admin/products/delete', 'POST', { id });
                await loadData();
            } catch (err) {
                tg.showAlert('Ошибка удаления');
            }
        }

        async function handleComingSubmit(e) {
            e.preventDefault();
            haptic('medium');
            
            const payload = {
                name: document.getElementById('come-name').value,
                season: document.getElementById('come-season').value
            };
            
            try {
                await apiRequest('/api/admin/coming-soon', 'POST', payload);
                closeModal('coming');
                await loadData();
            } catch (err) {
                tg.showAlert('Ошибка сохранения');
            }
        }

        async function deleteComing(id) {
            if (!confirm('Удалить эту позицию?')) return;
            try {
                await apiRequest('/api/admin/coming-soon/delete', 'POST', { id });
                await loadData();
            } catch (err) {
                tg.showAlert('Ошибка удаления');
            }
        }

        async function updateOrderStatus(orderId, newStatus) {
            haptic('medium');
            try {
                await apiRequest('/api/admin/orders/status', 'POST', { id: orderId, status: newStatus });
                await loadData();
                tg.showAlert(`Статус изменен на: ${newStatus}`);
            } catch (err) {
                tg.showAlert('Ошибка обновления статуса');
                await loadData(); // Откат UI
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Запуск
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
